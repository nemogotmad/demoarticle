    // ======================= 50 PREMIUM ARTICLES =======================
    const articles = [
        // TECHNOLOGY (10)
        { id:1, title:"10 Essential Free Apps That Will Change How You Use Your Phone", category:"Technology", image:"https://picsum.photos/id/0/400/250", excerpt:"From productivity to privacy, these apps solve real daily problems without costing a cent.", content:"<p>Smartphones are powerful, but the right apps make them extraordinary. After testing over 50 free applications, we handpicked 10 that stand out. First, 'Raindrop.io' helps you bookmark and organize web content seamlessly. Second, 'Bitwarden' manages all your passwords with bank-grade encryption — free forever. Third, 'Snapseed' by Google offers professional photo editing without watermarks. Fourth, 'Microsoft To Do' syncs across devices and uses AI to suggest tasks. Fifth, 'ProtonVPN' gives you secure browsing without logs. Sixth, 'KeePass' is offline and extremely safe. Seventh, 'VLC Media Player' plays any video format. Eighth, 'Signal' ensures private messaging. Ninth, 'Firefox Focus' blocks trackers automatically. Tenth, 'Open Camera' gives manual DSLR-like controls. Each app is regularly updated and privacy-respecting. Installing these will not only free up mental clutter but also increase your phone's usefulness tenfold. We recommend starting with Bitwarden for security, then exploring the others.</p>", date: new Date().toISOString(), views:0 },
        { id:2, title:"How to Protect Your Privacy Online: 7 Simple But Powerful Steps", category:"Technology", image:"https://picsum.photos/id/1/400/250", excerpt:"Stop worrying about data leaks. These straightforward actions make you invisible to most trackers.", content:"<p>Your online privacy is under constant attack. But you don't need to be a hacker to fight back. Step 1: Use a privacy-focused browser like Brave or Firefox with 'Enhanced Tracking Protection'. Step 2: Switch your default search engine to DuckDuckGo — it never stores your queries. Step 3: Install uBlock Origin to block hidden trackers on every site you visit. Step 4: Turn off 'personalized ads' in Google and Facebook settings. Step 5: Use temporary email addresses for newsletter signups. Step 6: Regularly clear cookies and use 'private windows' for sensitive searches. Step 7: Check 'haveibeenpwned.com' to see if your accounts were leaked. These steps take less than an hour but drastically reduce your digital footprint.</p>", date: new Date().toISOString(), views:0 },
        { id:3, title:"Top 5 AI Tools That Are Completely Free and Boost Workflow", category:"Technology", image:"https://picsum.photos/id/2/400/250", excerpt:"Stop paying for expensive subscriptions. These AI assistants do the heavy lifting without hidden fees.", content:"<p>Artificial intelligence is no longer a luxury. Today, incredible free tools exist. #1: ChatGPT (free tier) handles writing, coding, brainstorming, and summarization. #2: Leonardo.ai generates stunning images with 150 free credits daily. #3: ElevenLabs offers realistic text-to-speech voices (free tier includes 10,000 characters monthly). #4: Otter.ai records and transcribes meetings automatically — perfect for students and remote workers. #5: Grammarly’s free version corrects grammar, tone, and clarity across your emails and documents. Each tool has a generous free tier without forcing a credit card. Start by testing one tool per week. Soon, you'll wonder how you ever worked without them.</p>", date: new Date().toISOString(), views:0 },
        { id:4, title:"Smartphone Battery Life: 7 Myths and Real Fixes That Work", category:"Technology", image:"https://picsum.photos/id/3/400/250", excerpt:"Don't fall for false tips. These are the actual methods to make your battery last years longer.", content:"<p>Battery anxiety is real, but many 'tips' you hear are outdated. Myth #1: closing apps saves battery — actually, it uses more power because apps reload. Myth #2: you must fully drain the battery before charging — lithium-ion batteries prefer partial charges. Myth #3: using a fast charger kills your battery — modern phones manage heat intelligently. So what works? Keep your charge between 20% and 80% for daily use. Avoid extreme temperatures. Reduce screen brightness. Turn off background app refresh. Use dark mode on OLED screens. Following these real fixes can double your battery lifespan.</p>", date: new Date().toISOString(), views:0 },
        { id:5, title:"Cloud Storage Battle: Google Drive vs Dropbox vs OneDrive (2025)", category:"Technology", image:"https://picsum.photos/id/4/400/250", excerpt:"Which service gives you the best value? We compared speed, pricing, and features for you.", content:"<p>Cloud storage is essential, but choosing the right provider saves money and headaches. Google Drive offers 15GB free. It integrates deeply with Google Docs, Sheets, and Slides — perfect for collaboration. Dropbox gives only 2GB free but has superior syncing speeds. OneDrive gives 5GB free, and it's best if you use Microsoft Office. For paid plans, Google Drive's 100GB costs $1.99/month, Dropbox's 2TB starts at $9.99/month, OneDrive's 100GB is $1.99/month. Verdict: if you live in Google's ecosystem, choose Drive. For fast syncing, Dropbox wins. For Office users, OneDrive is unbeatable.</p>", date: new Date().toISOString(), views:0 },
        { id:6, title:"What Is ChatGPT? A Complete Beginner's Guide (With Real Examples)", category:"Technology", image:"https://picsum.photos/id/5/400/250", excerpt:"From writing emails to debugging code, here's how to use the AI that's changing everything.", content:"<p>ChatGPT is a conversational AI trained by OpenAI. It can answer questions, write essays, summarize articles, translate languages, and even generate creative stories. The free version (GPT-3.5) is lightning fast. How to start? Go to chat.openai.com, sign up, and begin typing. Example 1: 'Write a polite follow-up email for a job interview.' It will generate a perfect draft. Example 2: 'Explain quantum computing like I'm 10 years old.' It simplifies hard concepts. Pro tips: be specific in your prompts; ask it to 'act as a career coach' for better answers.</p>", date: new Date().toISOString(), views:0 },
        { id:7, title:"Social Media Security: 9 Settings You Must Change Right Now", category:"Technology", image:"https://picsum.photos/id/6/400/250", excerpt:"Hackers love default settings. Lock down your accounts with these quick adjustments.", content:"<p>Your social media accounts are treasure troves for scammers. Take 20 minutes to tighten security. On Facebook: go to Settings > Privacy Checkup; set 'Who can see your friends list?' to 'Only Me'. On Instagram: switch to private account; disable 'Show activity status'. On Twitter: enable 'Protect your Tweets'. Universal tips: enable two-factor authentication (2FA) using an authenticator app. Regularly review 'logged-in devices' and remove old ones. Use a unique password for each platform. Do these changes today — it's like locking your front door.</p>", date: new Date().toISOString(), views:0 },
        { id:8, title:"Best Free Antivirus for Windows & Mac: 2025 Lab Test Results", category:"Technology", image:"https://picsum.photos/id/7/400/250", excerpt:"Stop paying for subscriptions. These free tools beat paid competitors in real-world tests.", content:"<p>You don't need to spend money on antivirus. Independent labs consistently rate free options highly. For Windows: Microsoft Defender (built-in) now scores 99.9% protection when fully updated. For extra features, use Kaspersky Free. Bitdefender Free is lightweight. For Mac: Malwarebytes Free excels at removing adware. Important: always download software from official websites. Schedule weekly scans. With these free tools and common sense, you are 99% safe. Save your money for cloud backups instead.</p>", date: new Date().toISOString(), views:0 },
        { id:9, title:"How to Speed Up an Old Computer (Even a 10-Year-Old Laptop)", category:"Technology", image:"https://picsum.photos/id/8/400/250", excerpt:"Don't throw it away! These free methods make ancient hardware feel snappy again.", content:"<p>Old computers get slow because of software bloat, not hardware decay. Step 1: uninstall programs you never use. Step 2: disable startup programs. Step 3: clean up disk space. Step 4: switch to a lightweight browser. Step 5: replace the old hard drive with a $20 SSD — this single upgrade boosts speed by 300%. Step 6: increase RAM if possible. Even a 2012 laptop can browse the modern web smoothly after these tweaks. Try steps 1-4 first — they cost nothing and often fix 80% of slowness.</p>", date: new Date().toISOString(), views:0 },
        { id:10, title:"VPN Explained: Why You Need One and How to Choose", category:"Technology", image:"https://picsum.photos/id/9/400/250", excerpt:"Protect your public Wi-Fi data and access global content. A simple guide to Virtual Private Networks.", content:"<p>A VPN creates an encrypted tunnel between your device and the internet. On public Wi-Fi, hackers can easily steal your passwords. A VPN makes that data unreadable. Additionally, a VPN hides your IP address, so websites can't track your location. Free VPNs often sell your data. We recommend paid options: Mullvad ($5/month) for privacy, ProtonVPN (free tier with no logs), or NordVPN for speed. To use a VPN: download the app, click 'connect', and browse normally. Use it every time you join a public network.</p>", date: new Date().toISOString(), views:0 },

        // MAKING MONEY (10)
        { id:11, title:"10 Legit Ways to Make Money Online From Home (No Scams)", category:"Making Money", image:"https://picsum.photos/id/10/400/250", excerpt:"Real methods used by real people. No get-rich-quick schemes, just honest opportunities.", content:"<p>Making money online is possible, but you must avoid 'pay to start' scams. Here are 10 proven methods: 1. Freelancing on Upwork or Fiverr. 2. Selling printables on Etsy. 3. UserTesting — get paid $10 for 20-minute website reviews. 4. Online tutoring via Preply. 5. Print on Demand. 6. Affiliate marketing. 7. Sell stock photos. 8. Remote customer support. 9. Transcription on Rev.com. 10. Create a YouTube channel. None require upfront investment beyond time. Start with one method and stick with it for 3 months.</p>", date: new Date().toISOString(), views:0 },
        { id:12, title:"Freelancing for Beginners: Where to Start in 2025", category:"Making Money", image:"https://picsum.photos/id/11/400/250", excerpt:"Zero experience? No portfolio? This step-by-step roadmap gets you your first paid gig.", content:"<p>Freelancing seems intimidating, but thousands start every month. Step 1: Identify a marketable skill you already have. Step 2: Create a simple portfolio using Canva. Step 3: Sign up on Fiverr or Upwork. Step 4: Overdeliver on your first orders. Step 5: Gradually raise prices. Pro tip: specialize. Instead of 'I write articles', say 'I write SEO blog posts for vegan cafes'. Use ChatGPT to help write proposals. Within a month, you can land a $100 project. Start today — your first $5 gig awaits.</p>", date: new Date().toISOString(), views:0 },
        { id:13, title:"YouTube Monetization: How to Get 1000 Subscribers Fast", category:"Making Money", image:"https://picsum.photos/id/12/400/250", excerpt:"The algorithm rewards value, not tricks. Here's how to grow organically.", content:"<p>YouTube requires 1000 subscribers and 4000 watch hours to join the Partner Program. First, choose a niche you genuinely enjoy. Second, invest in a decent microphone. Third, create 'searchable' content. Fourth, hook viewers in the first 15 seconds. Fifth, ask people to subscribe at a natural moment. Sixth, promote your videos on Reddit. Seventh, collaborate with similar channels. Consistency: upload once per week for six months. You will likely hit 1000 subscribers by month 5. Don't buy subscribers — YouTube detects and bans accounts.</p>", date: new Date().toISOString(), views:0 },
        { id:14, title:"Print on Demand: A Complete Guide (Start With Zero Inventory)", category:"Making Money", image:"https://picsum.photos/id/13/400/250", excerpt:"Design, list, and sell t-shirts, mugs, and posters without holding any stock.", content:"<p>Print on Demand means you create designs, upload them to a platform like Redbubble or Printful, and they print & ship when someone orders. Start with free tools: Canva has thousands of templates. Create designs around niches: funny cat quotes, motivational gym phrases. List your products on Redbubble or connect Printful to Etsy. For marketing, create a Pinterest board. Many POD sellers earn $500-$2000/month part-time. Start with 20 designs, then double every month. It's fun, low-risk, and scales beautifully.</p>", date: new Date().toISOString(), views:0 },
        { id:15, title:"Affiliate Marketing for Beginners", category:"Making Money", image:"https://picsum.photos/id/14/400/250", excerpt:"Promote products and earn commissions. Learn the ethical way to recommend products.", content:"<p>Affiliate marketing means you earn a commission when someone buys through your special link. Start with Amazon Associates. Then join ShareASale for higher commissions. How to promote: create honest 'best of' lists on a blog. On YouTube, make review videos and put links in the description. On Reddit, answer questions helpfully. Never spam; always disclose 'affiliate link'. With a 2% conversion rate and $50 average product, 1000 daily visitors could earn $1000/month. Start with products you already use and love.</p>", date: new Date().toISOString(), views:0 },
        { id:16, title:"5 Side Hustles That Pay $500+ Per Month", category:"Making Money", image:"https://picsum.photos/id/15/400/250", excerpt:"No special skills required. These flexible hustles fit around your day job.", content:"<p>1. Pet sitting via Rover — earn $25-40 per night. 2. Power washing driveways — rent a machine, charge $100 per driveway. 3. Flipping furniture — find free items, refinish, sell for 3x price. 4. Grocery delivery — average $15-20/hour. 5. Teaching a skill on Outschool — $20-40 per student. Each can be started in a weekend. Even doing one hustle 5 hours a week yields $500/month. Choose the one that sounds fun, not just profitable.</p>", date: new Date().toISOString(), views:0 },
        { id:17, title:"Digital Products: Create & Sell Once, Earn Forever", category:"Making Money", image:"https://picsum.photos/id/16/400/250", excerpt:"E-books, planners, templates, courses — no shipping, no inventory. Pure profit after creation.", content:"<p>Digital products are the ultimate scalable income. Examples: PDF planners, Lightroom presets, resume templates, ebooks, online courses. Platforms: Gumroad or Etsy. Start with a low-price item ($5-10) to test demand. Use Canva for designs, ChatGPT to outline an ebook. To get sales: build a tiny email list and offer the product for free to first 10 subscribers. Example: 'Minimalist Weekly Planner PDF' sells 20 copies a day at $7 = $140 daily passive income.</p>", date: new Date().toISOString(), views:0 },
        { id:18, title:"Paid Survey Sites That Actually Pay Real Money", category:"Making Money", image:"https://picsum.photos/id/17/400/250", excerpt:"Avoid scams. Here are legit survey platforms used by market researchers worldwide.", content:"<p>Most survey sites waste your time, but a few are legitimate. 1. Prolific — pays in cash via PayPal. 2. Amazon Mechanical Turk — micro-tasks earning $8-12/hour. 3. UserTesting — $10 for 20-minute feedback. 4. Respondent.io — high-value interviews ($50-150 per hour). 5. Pinecone Research — product testing. Realistic earning: $100-300/month spending 5-10 hours weekly. Start with Prolific — it's the most transparent.</p>", date: new Date().toISOString(), views:0 },
        { id:19, title:"Virtual Assistant: How to Get Started (No Experience Needed)", category:"Making Money", image:"https://picsum.photos/id/18/400/250", excerpt:"Businesses need help with email, scheduling, and social media. You can do it remotely.", content:"<p>A Virtual Assistant handles administrative tasks for entrepreneurs. Typical duties: email management, calendar scheduling, social media posting. No degree required. How to start: List your skills. Create a simple LinkedIn profile. Offer a 'trial week' for free to first client. Join Facebook groups like 'Virtual Assistant Jobs'. Specialize to earn more: become a 'real estate VA' or 'podcast VA'. Many VAs earn $25-40/hour after 6 months. Start by helping a local business owner for cheap.</p>", date: new Date().toISOString(), views:0 },
        { id:20, title:"Dropshipping: Pros, Cons, and How to Start", category:"Making Money", image:"https://picsum.photos/id/19/400/250", excerpt:"Sell products without holding inventory. But watch out for common pitfalls.", content:"<p>Dropshipping lets you list products from AliExpress, and when a customer buys, the supplier ships directly. Pros: no inventory risk. Cons: low profit margins (10-30%), long shipping times. To succeed: find a niche product that solves a specific problem. Use Shopify + Oberlo. Create a branded store. Run Facebook ads to test products with $20/day budget. Many beginners lose money because they don't calculate ad costs. Start with a $200 budget and expect to break even for 3 months.</p>", date: new Date().toISOString(), views:0 },

        // HEALTH & FITNESS (10)
        { id:21, title:"15-Minute Home Workout: No Equipment, Full Body Burn", category:"Health", image:"https://picsum.photos/id/21/400/250", excerpt:"Short on time? This routine targets every muscle group and fits into any schedule.", content:"<p>You don't need a gym membership. This 15-minute circuit requires only your body weight. Perform each exercise for 45 seconds, rest 15 seconds: 1. Jumping jacks, 2. Bodyweight squats, 3. Push-ups, 4. Reverse lunges, 5. Plank, 6. High knees, 7. Glute bridges, 8. Mountain climbers, 9. Side lunges, 10. Bicycle crunches. Do this 4 times per week. After 2 weeks, you'll notice improved energy and muscle tone. No excuses — this works anywhere.</p>", date: new Date().toISOString(), views:0 },
        { id:22, title:"Healthy Meal Prep: 5 Easy Recipes for the Week (Under $40)", category:"Health", image:"https://picsum.photos/id/22/400/250", excerpt:"Save time, money, and calories by prepping Sunday. These recipes are delicious and simple.", content:"<p>Meal prep reduces decision fatigue. Recipe 1: Overnight oats. Recipe 2: Chicken fajita bowls. Recipe 3: Lentil soup. Recipe 4: Tuna salad wraps. Recipe 5: Roasted veggies and chickpeas. Each recipe costs roughly $8 total for 5 servings. Use glass containers. Sunday meal prep takes 2 hours but saves 10 hours during the week. Try it once — you'll never go back.</p>", date: new Date().toISOString(), views:0 },
        { id:23, title:"Sleep Better Tonight: 7 Science-Backed Tips", category:"Health", image:"https://picsum.photos/id/23/400/250", excerpt:"Insomnia is fixable. These habits improve sleep quality naturally and quickly.", content:"<p>1. No screens 60 minutes before bed. 2. Keep bedroom cool (65-68°F). 3. Same wake/sleep time even weekends. 4. No caffeine after 2 PM. 5. Get sunlight in the morning. 6. Write down worries in a journal. 7. Use white noise. If you can't sleep after 20 minutes, get up and read a boring book. Most people see improvement within 4 days. Prioritize sleep like you prioritize work.</p>", date: new Date().toISOString(), views:0 },
        { id:24, title:"Walking 30 Minutes a Day: Surprising Benefits", category:"Health", image:"https://picsum.photos/id/24/400/250", excerpt:"It's the simplest exercise with massive returns. Better mood, heart health, and creativity.", content:"<p>Walking reduces risk of heart disease by 35%, lowers blood pressure, and boosts creativity by 60%. Use a podcast to make it enjoyable. Walk after meals to stabilize blood sugar. If 30 minutes feels long, break into three 10-minute walks. In one month, you'll notice better mood and more energy. Start today: park farther from the store, take the stairs.</p>", date: new Date().toISOString(), views:0 },
        { id:25, title:"Morning Stretches: 5 Minutes to Reduce Back Pain", category:"Health", image:"https://picsum.photos/id/25/400/250", excerpt:"Wake up your spine and muscles. These gentle moves relieve tension from sleeping.", content:"<p>1. Cat-cow stretch. 2. Knee-to-chest. 3. Spinal twist. 4. Standing forward fold. 5. Neck rolls. Perform each stretch on both sides. Breathe deeply. Doing this before getting out of bed sets a positive tone. Within a week, you'll notice less morning stiffness. Your spine will thank you.</p>", date: new Date().toISOString(), views:0 },
        { id:26, title:"Hydration Hacks: How to Drink Enough Water", category:"Health", image:"https://picsum.photos/id/26/400/250", excerpt:"Dehydration causes fatigue and brain fog. Use these clever tricks to drink more water.", content:"<p>Signs of dehydration: dry lips, dark urine, afternoon headaches. Tips: 1. Use a marked water bottle. 2. Add fruit slices for flavor. 3. Drink a glass before every meal. 4. Set a phone reminder. 5. Eat water-rich foods: cucumbers, watermelon. Goal: half your body weight (lbs) in ounces. After one week, expect clearer skin and better focus.</p>", date: new Date().toISOString(), views:0 },
        { id:27, title:"5-Minute Mental Health Break for Busy People", category:"Health", image:"https://picsum.photos/id/27/400/250", excerpt:"Reduce anxiety and reset your nervous system anywhere — desk, car, or couch.", content:"<p>Technique 1: Box breathing — inhale 4 sec, hold 4 sec, exhale 4 sec, hold 4 sec. Technique 2: 5-4-3-2-1 grounding — name 5 things you see, 4 you feel, 3 you hear, 2 you smell, 1 you taste. Technique 3: body scan. These micro-breaks lower cortisol and improve focus. Set a timer to take one every 2 hours.</p>", date: new Date().toISOString(), views:0 },
        { id:28, title:"High Protein Breakfast Ideas (Under 10 Minutes)", category:"Health", image:"https://picsum.photos/id/28/400/250", excerpt:"Fuel your morning without cooking skills. These options keep you full until lunch.", content:"<p>1. Greek yogurt parfait (20g protein). 2. Scrambled eggs with cottage cheese. 3. Protein smoothie. 4. Overnight oats with protein powder. 5. Cottage cheese with peaches. 6. Breakfast burrito. Aim for 25-30g protein at breakfast. Studies show this reduces total daily calories by 200-300. Start with Greek yogurt — no cooking required.</p>", date: new Date().toISOString(), views:0 },
        { id:29, title:"Reduce Screen Time: Practical Strategies", category:"Health", image:"https://picsum.photos/id/29/400/250", excerpt:"Blue light affects sleep and eyes. Here's how to cut phone usage without willpower struggles.", content:"<p>1. Turn on grayscale mode — without color, phones become less addictive. 2. Delete social media apps; use browser version. 3. Keep phone in another room while working. 4. Set app timers. 5. Charge phone outside bedroom. 6. Use 20-20-20 rule: every 20 minutes, look 20 feet away for 20 seconds. Start with grayscale — it's surprisingly effective.</p>", date: new Date().toISOString(), views:0 },
        { id:30, title:"Meditation for Absolute Beginners: 5 Minutes a Day", category:"Health", image:"https://picsum.photos/id/30/400/250", excerpt:"No chanting or sitting cross-legged. Simple mindfulness that reduces stress.", content:"<p>Meditation is training for your attention. Sit comfortably, close eyes, focus on your breath. When your mind wanders, gently bring attention back to breathing. Use a free app like 'Insight Timer'. Benefits after 2 weeks: less reactivity, better focus. Try 5 minutes tomorrow morning. After a month, increase to 10 minutes.</p>", date: new Date().toISOString(), views:0 },

        // BUSINESS (10)
        { id:31, title:"Start an Online Business with Zero Money", category:"Business", image:"https://picsum.photos/id/31/400/250", excerpt:"No capital? No problem. Service-based businesses cost nothing to launch.", content:"<p>Start with services you already know: 1. Social media management. 2. Resume writing. 3. Tutoring. 4. Virtual assistant. 5. Dog walking. 6. Pressure washing. 7. Freelance writing. Use free tools: Canva for logos, Calendly for scheduling. Get your first client by offering a free trial. Within 3 months, you can have a $2000/month micro-business.</p>", date: new Date().toISOString(), views:0 },
        { id:32, title:"Social Media Marketing for Small Business (Free Strategies)", category:"Business", image:"https://picsum.photos/id/32/400/250", excerpt:"No ad budget? Organic methods that actually work in 2025.", content:"<p>1. Post 3x weekly consistently. 2. Reply to every comment within an hour. 3. Use trending audio on Reels/TikTok. 4. Collaborate with micro-influencers. 5. Share user-generated content. 6. Host a giveaway. 7. Post educational content. Use Canva for graphics. Show your face; people connect with humans, not logos. Start with one platform and master it.</p>", date: new Date().toISOString(), views:0 },
        { id:33, title:"Time Management Secrets of Successful Entrepreneurs", category:"Business", image:"https://picsum.photos/id/33/400/250", excerpt:"They don't have more hours. They use these systems to protect focus.", content:"<p>1. Time blocking — assign specific hours for specific tasks. 2. Eat the frog — do hardest task first. 3. Pomodoro — 25 min work, 5 min break. 4. Batch similar tasks. 5. Say no to low-value meetings. 6. 2-minute rule. 7. Weekly review. Use Google Calendar. Blocking 3 hours for deep work changes everything. Try Pomodoro tomorrow.</p>", date: new Date().toISOString(), views:0 },
        { id:34, title:"Build an Email List from Scratch (Free Tools)", category:"Business", image:"https://picsum.photos/id/34/400/250", excerpt:"Your audience is your asset. Start collecting emails today with these simple methods.", content:"<p>Email marketing has the highest ROI. 1. Use Mailchimp (500 contacts free). 2. Create a lead magnet — free PDF checklist. 3. Add signup form to your website. 4. Post lead magnet on Reddit or Facebook groups. 5. Send welcome email with download link. 6. Send weekly value emails. After 3 months, you'll have 500 engaged subscribers.</p>", date: new Date().toISOString(), views:0 },
        { id:35, title:"5 Productivity Tools Every Business Owner Needs", category:"Business", image:"https://picsum.photos/id/35/400/250", excerpt:"Stop using scattered sticky notes. These apps centralize your work.", content:"<p>1. Notion — all-in-one workspace. 2. Trello — visual task management. 3. Slack — team communication. 4. Calendly — schedule meetings. 5. OBS Studio — record tutorials. Each has generous free tiers. Spend one hour setting up Notion. Master one tool per week. Start with Calendly — it saves 5 hours monthly.</p>", date: new Date().toISOString(), views:0 },
        { id:36, title:"Customer Service Tips That Build Loyalty", category:"Business", image:"https://picsum.photos/id/36/400/250", excerpt:"Happy customers become repeat buyers. These tactics cost nothing but effort.", content:"<p>1. Reply within 2 hours. 2. Apologize genuinely. 3. Surprise refunds — refund unhappy customers and let them keep product. 4. Send handwritten thank-you notes. 5. Ask for feedback. 6. Create FAQ page. 7. Use free helpdesk like Freshdesk. Customers remember how you made them feel. One excellent review can bring 10 new customers.</p>", date: new Date().toISOString(), views:0 },
        { id:37, title:"Create a Business Plan in 7 Simple Steps", category:"Business", image:"https://picsum.photos/id/37/400/250", excerpt:"Don't write a 50-page document. This lean plan is what investors actually want.", content:"<p>One-page template: 1. Problem you solve. 2. Your solution. 3. Target market. 4. Revenue model. 5. Marketing channels. 6. Key metrics. 7. Costs & funding. Use Google Docs. Keep to 500 words. Update quarterly. Many successful startups began with a napkin sketch. Fill it out in 2 hours.</p>", date: new Date().toISOString(), views:0 },
        { id:38, title:"Branding Basics: Stand Out From Competitors", category:"Business", image:"https://picsum.photos/id/38/400/250", excerpt:"Brand is not a logo. It's how people feel. Build a memorable identity for free.", content:"<p>Branding starts with clarity. What do you stand for? Use consistent colors (choose 3) and fonts (2 max). Tools: Coolors for palettes. Create a simple logo using Canva. The real brand-building happens in customer touchpoints: email tone, packaging, social media replies. A brand is what people say about you when you leave the room.</p>", date: new Date().toISOString(), views:0 },
        { id:39, title:"How to Get Your First 100 Customers", category:"Business", image:"https://picsum.photos/id/39/400/250", excerpt:"The hardest part is the beginning. Use these scrappy methods to find early adopters.", content:"<p>1. Leverage personal network. 2. Offer founding member discount. 3. Partner with complementary businesses. 4. Post in niche subreddits. 5. Attend local networking events. 6. Create referral program. 7. Cold email 100 potential customers daily. Most people stop after 10 rejections. Persistence wins. Contact 30 people daily for two weeks — you will hit 100 customers.</p>", date: new Date().toISOString(), views:0 },
        { id:40, title:"Financial Management for Small Business Owners", category:"Business", image:"https://picsum.photos/id/40/400/250", excerpt:"No accounting degree needed. Use this free method to track every dollar.", content:"<p>1. Open separate free business bank account. 2. Use Wave accounting (free). 3. Set aside 25% of every payment for taxes. 4. Track profit/loss monthly with Google Sheet. 5. Pay yourself a fixed salary. Use 'profit first' system. This prevents cash flow crises. Takes 2 hours to set up and saves thousands in accountant fees.</p>", date: new Date().toISOString(), views:0 },

        // LIFESTYLE (10)
        { id:41, title:"Morning Routine Ideas for a Productive Day", category:"Lifestyle", image:"https://picsum.photos/id/41/400/250", excerpt:"Design your own ritual. These elements boost mood and focus before 9 AM.", content:"<p>Pick 3-4 of these: 1. Wake without snooze. 2. Drink 16oz water. 3. Make your bed. 4. 5 minutes stretching. 5. Write 3 priorities. 6. Eat protein breakfast. 7. No phone first 30 minutes. Example: 7 AM wake, water, stretch, breakfast, write priorities. Within 2 weeks, mornings become automatic. Start with two habits tomorrow.</p>", date: new Date().toISOString(), views:0 },
        { id:42, title:"Declutter Your Home in 30 Minutes", category:"Lifestyle", image:"https://picsum.photos/id/42/400/250", excerpt:"Clutter causes stress. This rapid technique clears any room fast.", content:"<p>Set a timer for 30 minutes. Label 5 boxes: Keep, Donate, Trash, Relocate, Sell. Start with one surface. Pick up each item and decide instantly. After timer, take out trash and put donate box in car. Do one room per day. Within a week, your home feels lighter. Start with your nightstand right now.</p>", date: new Date().toISOString(), views:0 },
        { id:43, title:"Budget Travel Tips: Explore More for Less", category:"Lifestyle", image:"https://picsum.photos/id/43/400/250", excerpt:"Travel doesn't have to be expensive. Use these strategies for cheap flights and stays.", content:"<p>1. Use Google Flights 'explore' map. 2. Fly on Tuesdays/Wednesdays. 3. Incognito mode prevents price hikes. 4. Stay in hostels. 5. Eat at local markets. 6. Use public transit. 7. Travel with carry-on only. 8. Book flights 6-8 weeks in advance. Example: a week in Lisbon can cost $500 including flight. Set price alerts and be flexible.</p>", date: new Date().toISOString(), views:0 },
        { id:44, title:"How to Build Good Habits That Stick", category:"Lifestyle", image:"https://picsum.photos/id/44/400/250", excerpt:"Willpower is overrated. Use environment design to make good habits automatic.", content:"<p>Based on Atomic Habits: 1) Make it obvious — put running shoes next to bed. 2) Make it attractive — pair with something you enjoy. 3) Make it easy — start with 2 minutes only. 4) Make it satisfying — track with calendar. Example for flossing: keep floss next to toothbrush, floss one tooth. Start with ridiculously small habits. 'One push-up' leads to five.</p>", date: new Date().toISOString(), views:0 },
        { id:45, title:"Work From Home Setup: Ergonomic Tips", category:"Lifestyle", image:"https://picsum.photos/id/45/400/250", excerpt:"Prevent back and wrist pain with these cheap adjustments to any desk.", content:"<p>1. Monitor at eye level — stack books. 2. Use separate keyboard and mouse. 3. Feet flat on floor — use shoebox as footrest. 4. Take 2-minute stretch breaks. 5. Screen an arm's length away. 6. Towel rolled for lumbar support. 7. Look away every 20 minutes. These reduce fatigue by 50%. Try towel lumbar support right now.</p>", date: new Date().toISOString(), views:0 },
        { id:46, title:"Time Blocking: A Simple Productivity Method", category:"Lifestyle", image:"https://picsum.photos/id/46/400/250", excerpt:"Stop multitasking. Assign specific hours to specific tasks and protect that time.", content:"<p>Schedule your day in chunks: 8-10 AM deep work, 10-11 AM emails, 11-12 meetings, 1-3 PM creative work. Use Google Calendar and color-code blocks. At day end, plan next day's blocks (10 minutes). Benefits: reduces decision fatigue, ensures important work gets done. Start by blocking 2 hours for your most important task tomorrow morning.</p>", date: new Date().toISOString(), views:0 },
        { id:47, title:"Save Money Without Feeling Deprived", category:"Lifestyle", image:"https://picsum.photos/id/47/400/250", excerpt:"Cut spending without cutting joy. Use these painless methods to build savings.", content:"<p>1. 30-day rule — wait 30 days before buying non-essentials. 2. Cancel unused subscriptions. 3. Cook at home 5 days a week — save $200/month. 4. Use library for books. 5. Buy generic brands. 6. Walk for trips under 1 mile. 7. Negotiate bills. 8. Host potluck instead of restaurant. After 30 days, use saved money for something meaningful.</p>", date: new Date().toISOString(), views:0 },
        { id:48, title:"Minimalist Living: Less Stuff, More Happiness", category:"Lifestyle", image:"https://picsum.photos/id/48/400/250", excerpt:"Minimalism isn't about empty rooms. It's about owning only what adds value.", content:"<p>Start with one drawer. Remove everything. Put back only what you've used in past 3 months. For closet: turn all hangers backward; after 6 months, donate clothes with still-backward hangers. Benefits: less cleaning, less decision fatigue. Try 30-day challenge: remove one item on day 1, two on day 2, up to 30 on day 30.</p>", date: new Date().toISOString(), views:0 },
        { id:49, title:"How to Cook Healthy Meals on a Budget", category:"Lifestyle", image:"https://picsum.photos/id/49/400/250", excerpt:"Nutritious food doesn't require expensive superfoods. These staples cost little.", content:"<p>Base pantry on: rice, beans, lentils, oats, frozen vegetables, eggs, canned tomatoes, onions, potatoes. Meal ideas: lentil soup ($0.80/serving), bean burritos ($0.60), oatmeal with banana ($0.50). Buy spices in bulk. Cook in batches. A month of healthy eating can cost $150-200. Start with lentil soup this week.</p>", date: new Date().toISOString(), views:0 },
        { id:50, title:"Digital Detox: How to Unplug on Weekends", category:"Lifestyle", image:"https://picsum.photos/id/50/400/250", excerpt:"Set boundaries with technology. Reclaim your weekend without missing anything important.", content:"<p>1. Turn off work email notifications Saturday-Sunday. 2. Set app timers: 30 min for social media. 3. Phone-free meals. 4. Saturday morning: no screens until 10 AM. 5. Replace scrolling with a hobby. Use old-fashioned alarm clock. After two weekends, you'll feel calmer on Monday. Try one screen-free hour tomorrow.</p>", date: new Date().toISOString(), views:0 }
    ];

    let currentFilter = "all";
    let currentView = "list";

    function showArticleList() {
        currentView = "list";
        renderArticles();
        if (window.history.pushState) window.history.pushState({}, '', window.location.pathname);
    }

    function showSingleArticle(id) {
        const article = articles.find(a => a.id == id);
        if (!article) { showArticleList(); return; }
        currentView = "single";
        article.views++;
        const container = document.getElementById('articlesGrid');
        container.innerHTML = `
            <div class="single-article">
                <a href="#" onclick="showArticleList(); return false;" class="back-btn">← Back to articles</a>
                <img src="${article.image}" style="width:100%; border-radius:24px; margin:1rem 0;" onerror="this.src='https://picsum.photos/400/250'">
                <span class="article-category">${article.category}</span>
                <h1 style="margin:1rem 0;">${escapeHtml(article.title)}</h1>
                <div style="color:#64748b; margin-bottom:1.5rem;">📅 ${new Date(article.date).toLocaleDateString()}</div>
                <div style="line-height:1.8;">${article.content}</div>
            </div>`;
        if (window.history.pushState) window.history.pushState({}, '', `?article=${id}`);
    }

    function renderArticles() {
        const grid = document.getElementById('articlesGrid');
        if (!grid) return;
        let filtered = currentFilter === 'all' ? articles : articles.filter(a => a.category === currentFilter);
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
        if (filtered.length === 0) { grid.innerHTML = '<div style="text-align:center; padding:3rem;">No articles in this category.</div>'; return; }
        grid.innerHTML = filtered.map(article => `
            <div class="article-card" onclick="navigateToArticle(${article.id})">
                <img src="${article.image}" class="article-image" onerror="this.src='https://picsum.photos/400/250'">
                <div class="article-content">
                    <span class="article-category">${article.category}</span>
                    <h3 class="article-title">${escapeHtml(article.title)}</h3>
                    <p class="article-excerpt">${escapeHtml(article.excerpt.substring(0, 120))}...</p>
                </div>
            </div>
        `).join('');
    }

    function navigateToArticle(id) { showSingleArticle(id); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function setupFilters() {
        const filters = document.querySelectorAll('.filter-btn');
        filters.forEach(btn => {
            btn.addEventListener('click', function() {
                filters.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.getAttribute('data-cat');
                if (currentView === 'list') renderArticles();
                else showArticleList();
            });
        });
    }

    window.addEventListener('popstate', () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('article');
        if (id) showSingleArticle(parseInt(id));
        else showArticleList();
    });

    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('article');
    if (articleId) showSingleArticle(parseInt(articleId));
    else { showArticleList(); setupFilters(); }
</script>
